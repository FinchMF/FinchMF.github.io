<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll('script[type^="math/tex"]').forEach(function(el) {
        var displayMode = el.getAttribute('type').indexOf('mode=display') > -1;
        var math = el.textContent;
        var rendered = document.createElement(displayMode ? 'div' : 'span');
        katex.render(math, rendered, { displayMode: displayMode, throwOnError: false });
        el.parentNode.replaceChild(rendered, el);
      });
    });
  </script>
</head>
